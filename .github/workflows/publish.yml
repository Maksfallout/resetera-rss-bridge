name: Publish Daily Post

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 👈 Добавлено: загружаем полную историю Git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run publisher
        env:
          CHADGPT_API_KEY: ${{ secrets.CHADGPT_API_KEY }}
        run: python publisher.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A feed.xml published.json images/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Publish daily post [skip ci]"
          git pull origin main --rebase  # 👈 Добавлено: синхронизируемся с удалённым репозиторием
          git push origin main           # 👈 Исправлено: убрали "|| true", чтобы видеть реальный статус
