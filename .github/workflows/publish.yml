name: Publish Daily Post

on:
  schedule:
    - cron: '0 9 * * *'   # каждый день в 09:00 UTC = 12:00 МСК
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run publisher
        env:
          CHADGPT_API_KEY: ${{ secrets.CHADGPT_API_KEY }}
        run: python publisher.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A feed.xml published.json images/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Publish daily post [skip ci]"
          git push || true
